name: Publish

on:
  push:
    tags:
      - 'paubox-cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish from (e.g. paubox-cli-v0.1.1)'
        required: true

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install libsecret
        run: sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Validate (typecheck + lint + test + build)
        run: npm run prepublishOnly

      - name: Publish to npm
        run: npm publish --provenance --access public
